<script>
(function() {
    const { createApp, ref, reactive, onMounted } = Vue;
    const app = createApp({
        setup() {
            const loading = ref(false);
            const models = ref([]);
            const providers = ref([]);
            const filter = reactive({
                type: '',
                provider: '',
                keyword: ''
            });
            const typeOptions = [
                { label: '全部', value: '' },
                { label: '对话', value: 'chat' },
                { label: '向量', value: 'embedding' },
                { label: '图像', value: 'image' },
                { label: '音频', value: 'audio' },
                { label: '其他', value: 'other' }
            ];

            // 分类相关
            const categories = ref([]);
            const activeCategory = ref(null);
            const categoryLoading = ref(false);
            const categoryInfo = ref(null);
            const categoryModels = ref([]);

            function typeLabel(type) {
                var map = { chat: '对话', embedding: '向量', image: '图像', audio: '音频', other: '其他' };
                return map[type] || type || '未知';
            }

            function typeTheme(type) {
                var map = { chat: 'primary', embedding: 'success', image: 'warning', audio: 'danger', other: 'default' };
                return map[type] || 'default';
            }

            function formatPrice(price) {
                if (price === null || price === undefined) return '-';
                var n = parseFloat(price);
                if (isNaN(n)) return '-';
                return n % 1 === 0 ? n.toString() : n.toFixed(4).replace(/0+$/, '');
            }

            function fetchModels() {
                loading.value = true;
                var params = {};
                if (filter.type) params.type = filter.type;
                if (filter.provider) params.provider = filter.provider;
                if (filter.keyword) params.keyword = filter.keyword;

                axios.get('/api/user/model-square', { params: params }).then(function(res) {
                    if (res.data.code === 0) {
                        models.value = res.data.data;
                    }
                }).finally(function() { loading.value = false; });
            }

            function fetchProviders() {
                axios.get('/api/user/model-square/providers').then(function(res) {
                    if (res.data.code === 0) {
                        providers.value = res.data.data;
                    }
                });
            }

            function fetchCategories() {
                axios.get('/api/categories').then(function(res) {
                    if (res.data.code === 0) {
                        categories.value = res.data.data;
                    }
                });
            }

            function fetchCategoryDetail(categoryId) {
                categoryLoading.value = true;
                categoryInfo.value = null;
                categoryModels.value = [];
                axios.get('/api/categories/' + categoryId).then(function(res) {
                    if (res.data.code === 0) {
                        categoryInfo.value = res.data.data.category;
                        categoryModels.value = res.data.data.models;
                    }
                }).finally(function() { categoryLoading.value = false; });
            }

            function onCategoryChange(catId) {
                activeCategory.value = catId;
                if (catId === null) {
                    // 切回全部视图
                    fetchModels();
                } else {
                    fetchCategoryDetail(catId);
                }
            }

            function onTypeFilter(val) {
                filter.type = val;
                fetchModels();
            }

            function onProviderFilter(val) {
                filter.provider = val;
                fetchModels();
            }

            onMounted(function() {
                fetchModels();
                fetchProviders();
                fetchCategories();
            });

            return {
                loading, models, providers, filter, typeOptions,
                categories, activeCategory, categoryLoading, categoryInfo, categoryModels,
                typeLabel, typeTheme, formatPrice,
                fetchModels, onTypeFilter, onProviderFilter, onCategoryChange
            };
        }
    });
    app.use(TDesign);
    app.mount('#page-app');
})();
</script>
