<script>
(function() {
    // 高亮当前导航
    var path = window.location.pathname;
    if (path === '/') document.getElementById('nav-home').classList.add('active');
    else if (path === '/pricing') document.getElementById('nav-pricing').classList.add('active');
    else if (path.startsWith('/user')) document.getElementById('nav-console').classList.add('active');

    // 检查登录状态，已登录则显示用户名
    axios.get('/api/user/auth/info').then(function(res) {
        if (res.data.code === 0) {
            var user = res.data.data;
            var name = user.display_name || user.username;
            document.getElementById('nav-auth').innerHTML =
                '<span style="font-size:14px;color:#333;">' + name + '</span>' +
                '<a href="/user/dashboard"><t-button theme="primary" variant="outline" size="small">控制台</t-button></a>';
        }
    }).catch(function() {});
})();
</script>
