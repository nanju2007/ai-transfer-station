            const registerForm = reactive({ register_enabled: false, register_email_verify: false });
            const termsForm = reactive({ terms_of_service: '', privacy_policy: '' });

            // 屏蔽词表单
            const defaultWordForm = { word: '', type: 3, action: 1, replacement: '***' };
            const wordForm = reactive({ ...defaultWordForm });
            const batchForm = reactive({ words: '', type: 3, action: 1, replacement: '***' });

            const wordColumns = [
                { colKey: 'id', title: 'ID', width: 70 },
                { colKey: 'word', title: '屏蔽词', width: 200 },
                { colKey: 'type', title: '类型', width: 90, cell: 'type' },
                { colKey: 'action', title: '动作', width: 90, cell: 'action' },
                { colKey: 'replacement', title: '替换词', width: 120 },
                { colKey: 'status', title: '状态', width: 80, cell: 'status' },
                { colKey: 'operation', title: '操作', width: 140, cell: 'operation', fixed: 'right' }
            ];

            var groupFormMap = {
                site: siteForm,
                log: logForm,
                blocked_words: blockedWordsConfig,
                payment: paymentForm,
                smtp: smtpForm,
                rate_limit: rateLimitForm,
                performance: performanceForm,
                quota: quotaForm,
                checkin: checkinForm,
                recharge: rechargeForm,
                captcha: captchaForm,
                register: registerForm,
                terms: termsForm
            };

            function toBool(val) {
                return val === true || val === 'true' || val === '1' || val === 1;
            }

            function loadOptions(group) {
                axios.get('/api/admin/options', { params: { group: group } }).then(function(res) {
                    if (res.data.code === 0) {
                        var data = res.data.data;
                        var form = groupFormMap[group];
                        if (form && data) {
                            Object.keys(form).forEach(function(key) {
                                if (data[key] !== undefined && data[key] !== null) {
                                    if (typeof form[key] === 'boolean') {
                                        // 布尔类型：将字符串转换为真正的布尔值
                                        form[key] = toBool(data[key]);
                                    } else if (Array.isArray(form[key])) {
                                        // 数组类型：从 JSON 字符串解析
                                        try {
                                            var parsed = typeof data[key] === 'string' ? JSON.parse(data[key]) : data[key];
                                            var arr = Array.isArray(parsed) ? parsed : [];
                                            // pay_channels 需要规范化为 {name, label} 对象格式
                                            if (key === 'pay_channels') {
                                                arr = arr.map(function(ch) {
                                                    if (typeof ch === 'string') {
                                                        return { name: ch, label: '' };
                                                    }
                                                    return { name: ch.name || '', label: ch.label || '' };
                                                });
                                            }
                                            form[key] = arr;
                                        } catch (e) {
                                            form[key] = [];
                                        }
                                    } else {
                                        form[key] = data[key];
                                    }
                                }
                            });
                        }
                    }
                });
            }

            function saveOptions(group, form) {
                saving.value = true;
                var options = {};
                Object.keys(form).forEach(function(key) {
                    // 数组类型（如 pay_channels）序列化为 JSON 字符串
                    if (Array.isArray(form[key])) {
                        options[key] = JSON.stringify(form[key]);
                    } else {
                        options[key] = String(form[key]);
                    }
                });

                axios.put('/api/admin/options', { options: options }).then(function(res) {
                    if (res.data.code === 0) {
                        TDesign.MessagePlugin.success('保存成功');
                        // 站点设置修改后刷新页面，使导航栏名称和Logo立即生效
                        if (group === 'site') {
                            setTimeout(function() { window.location.reload(); }, 500);
                        }
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '保存失败');
                    }
                }).catch(function(err) {
                    TDesign.MessagePlugin.error(err.response?.data?.msg || '请求失败');
                }).finally(function() { saving.value = false; });
            }

            function onTabChange(val) {
                loadOptions(val);
                if (val === 'blocked_words') {
                    fetchWords();
                }
            }

            // 屏蔽词相关
            function fetchWords() {
                wordLoading.value = true;
                axios.get('/api/admin/blocked-words', { params: { page: wordPagination.current, per_page: wordPagination.pageSize } }).then(function(res) {
                    if (res.data.code === 0) {
                        wordTableData.value = res.data.data.list;
                        wordPagination.total = res.data.data.total;
                    }
                }).finally(function() { wordLoading.value = false; });
            }

            function onWordPageChange(page) {
                wordPagination.current = page;
                fetchWords();
            }

            function openAddWord() {
                Object.assign(wordForm, defaultWordForm);
                editingWordId.value = null;
                wordDialogTitle.value = '添加屏蔽词';
                wordDialogVisible.value = true;
            }

            function openEditWord(row) {
                editingWordId.value = row.id;
                wordDialogTitle.value = '编辑屏蔽词';
                wordForm.word = row.word;
                wordForm.type = row.type;
                wordForm.action = row.action;
                wordForm.replacement = row.replacement || '***';
                wordDialogVisible.value = true;
            }

            function handleSubmitWord() {
                saving.value = true;
                var data = { ...wordForm };
                var promise;
                if (editingWordId.value) {
                    promise = axios.put('/api/admin/blocked-words/' + editingWordId.value, data);
                } else {
                    promise = axios.post('/api/admin/blocked-words', data);
                }
                promise.then(function(res) {
                    if (res.data.code === 0) {
                        TDesign.MessagePlugin.success(editingWordId.value ? '更新成功' : '添加成功');
                        wordDialogVisible.value = false;
                        fetchWords();
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '操作失败');
                    }
                }).catch(function(err) {
                    TDesign.MessagePlugin.error(err.response?.data?.msg || '请求失败');
                }).finally(function() { saving.value = false; });
            }

            function handleDeleteWord(row) {
                axios.delete('/api/admin/blocked-words/' + row.id).then(function(res) {
                    if (res.data.code === 0) {
                        TDesign.MessagePlugin.success('删除成功');
                        fetchWords();
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '删除失败');
                    }
                });
            }

            function openBatchImport() {
                batchForm.words = '';
                batchForm.type = 3;
                batchForm.action = 1;
                batchForm.replacement = '***';
                batchImportVisible.value = true;
            }

            function handleBatchImport() {
                var lines = batchForm.words.split('\n').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
                if (lines.length === 0) {
                    TDesign.MessagePlugin.warning('请输入屏蔽词');
                    return;
                }
                saving.value = true;
                axios.post('/api/admin/blocked-words', {
                    word: lines[0],
                    type: batchForm.type,
                    action: batchForm.action,
                    replacement: batchForm.replacement
                }).then(function() {
                    // 逐个添加剩余词
                    var promises = lines.slice(1).map(function(word) {
                        return axios.post('/api/admin/blocked-words', {
                            word: word,
                            type: batchForm.type,
                            action: batchForm.action,
                            replacement: batchForm.replacement
                        });
                    });
                    return Promise.all(promises);
                }).then(function() {
                    TDesign.MessagePlugin.success('批量导入完成，共 ' + lines.length + ' 个词');
                    batchImportVisible.value = false;
                    fetchWords();
                }).catch(function(err) {
                    TDesign.MessagePlugin.error(err.response?.data?.msg || '导入失败');
                }).finally(function() { saving.value = false; });
            }

            function addPayChannel() {
                paymentForm.pay_channels.push({ name: '', label: '' });
            }

            function removePayChannel(idx) {
                paymentForm.pay_channels.splice(idx, 1);
            }

            onMounted(function() {
                loadOptions('site');
            });

            return {
                activeTab, saving, wordLoading,
                siteForm, logForm, blockedWordsConfig, paymentForm, smtpForm, rateLimitForm, performanceForm,
                quotaForm, checkinForm, rechargeForm, captchaForm, registerForm, termsForm,
                wordTableData, wordColumns, wordPagination,
                wordDialogVisible, wordDialogTitle, wordForm,
                batchImportVisible, batchForm, editingWordId,
                saveOptions, onTabChange, loadOptions,
                fetchWords, onWordPageChange,
                openAddWord, openEditWord, handleSubmitWord, handleDeleteWord,
                openBatchImport, handleBatchImport,
                addPayChannel, removePayChannel
            };
        }
    });
    app.use(TDesign);
    app.mount('#page-app');
})();
</script>
