<script>
(function() {
    var ref = Vue.ref;
    var reactive = Vue.reactive;
    var onMounted = Vue.onMounted;
    var nextTick = Vue.nextTick;

    var statusMap = { pending: '待处理', processing: '处理中', resolved: '已解决', closed: '已关闭' };
    var categoryMap = { general: '一般咨询', billing: '账单相关', technical: '技术问题', suggestion: '建议反馈' };
    var priorityMap = { low: '低', normal: '普通', high: '高', urgent: '紧急' };
    var statusTheme = { pending: 'warning', processing: 'primary', resolved: 'success', closed: 'default' };
    var priorityTheme = { low: 'default', normal: 'primary', high: 'warning', urgent: 'danger' };

    var app = Vue.createApp({
        setup() {
            var loading = ref(false);
            var replying = ref(false);
            var tableData = ref([]);
            var stats = reactive({ pending: 0, processing: 0, resolved: 0, closed: 0 });
            var pagination = reactive({ current: 1, total: 0, pageSize: 15 });
            var filters = reactive({ keyword: '', status: '', category: '', priority: '' });

            var drawerVisible = ref(false);
            var currentTicket = ref({});
            var replies = ref([]);
            var replyContent = ref('');
            var chatAreaRef = ref(null);

            var columns = [
                { colKey: 'id', title: 'ID', width: 70 },
                { colKey: 'title', title: '标题', ellipsis: true },
                { colKey: 'user', title: '用户', width: 110, cell: 'user' },
                { colKey: 'category', title: '分类', width: 100, cell: 'category' },
                { colKey: 'status', title: '状态', width: 90, cell: 'status' },
                { colKey: 'priority', title: '优先级', width: 80, cell: 'priority' },
                { colKey: 'last_reply_at', title: '最后回复', width: 160, cell: 'last_reply_at' },
                { colKey: 'created_at', title: '创建时间', width: 160, cell: 'created_at' },
                { colKey: 'operation', title: '操作', width: 220, cell: 'operation', fixed: 'right' }
            ];

            var priorityOptions = [
                { content: '低', value: 'low' },
                { content: '普通', value: 'normal' },
                { content: '高', value: 'high' },
                { content: '紧急', value: 'urgent' }
            ];

            function getStatusOptions(current) {
                var all = [
                    { content: '处理中', value: 'processing' },
                    { content: '已解决', value: 'resolved' },
                    { content: '已关闭', value: 'closed' }
                ];
                return all.filter(function(item) { return item.value !== current; });
            }

            function formatDate(dateStr) {
                if (!dateStr) return '-';
                var d = new Date(dateStr);
                if (isNaN(d.getTime())) return '-';
                return d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0') + ' ' +
                    String(d.getHours()).padStart(2, '0') + ':' +
                    String(d.getMinutes()).padStart(2, '0') + ':' +
                    String(d.getSeconds()).padStart(2, '0');
            }

            function fetchStats() {
                axios.get('/api/admin/tickets/stats').then(function(res) {
                    if (res.data.code === 0) {
                        Object.assign(stats, res.data.data);
                    }
                });
            }

            function fetchList() {
                loading.value = true;
                var params = { page: pagination.current, per_page: pagination.pageSize };
                if (filters.keyword) params.keyword = filters.keyword;
                if (filters.status) params.status = filters.status;
                if (filters.category) params.category = filters.category;
                if (filters.priority) params.priority = filters.priority;
                axios.get('/api/admin/tickets/list', { params: params }).then(function(res) {
                    if (res.data.code === 0) {
                        tableData.value = res.data.data.list;
                        pagination.total = res.data.data.total;
                    }
                }).finally(function() { loading.value = false; });
            }

            function onPageChange(page) {
                pagination.current = page;
                fetchList();
            }

            function resetFilters() {
                filters.keyword = '';
                filters.status = '';
                filters.category = '';
                filters.priority = '';
                pagination.current = 1;
                fetchList();
            }

            function scrollChatToBottom() {
                nextTick(function() {
                    var el = chatAreaRef.value;
                    if (el) el.scrollTop = el.scrollHeight;
                });
            }

            function openDetail(row) {
                currentTicket.value = {};
                replies.value = [];
                replyContent.value = '';
                drawerVisible.value = true;
                axios.get('/api/admin/tickets/detail', { params: { id: row.id } }).then(function(res) {
                    if (res.data.code === 0) {
                        currentTicket.value = res.data.data.ticket;
                        replies.value = res.data.data.replies;
                        scrollChatToBottom();
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '获取详情失败');
                    }
                });
            }

            function sendReply(resolveAfter) {
                if (!replyContent.value.trim()) {
                    TDesign.MessagePlugin.warning('请输入回复内容');
                    return;
                }
                replying.value = true;
                axios.post('/api/admin/tickets/reply', {
                    ticket_id: currentTicket.value.id,
                    content: replyContent.value
                }).then(function(res) {
                    if (res.data.code === 0) {
                        TDesign.MessagePlugin.success('回复成功');
                        replyContent.value = '';
                        // 刷新详情
                        axios.get('/api/admin/tickets/detail', { params: { id: currentTicket.value.id } }).then(function(r) {
                            if (r.data.code === 0) {
                                currentTicket.value = r.data.data.ticket;
                                replies.value = r.data.data.replies;
                                scrollChatToBottom();
                            }
                        });
                        if (resolveAfter) {
                            axios.post('/api/admin/tickets/update-status', {
                                id: currentTicket.value.id,
                                status: 'resolved'
                            }).then(function(r2) {
                                if (r2.data.code === 0) {
                                    currentTicket.value.status = 'resolved';
                                    fetchList();
                                    fetchStats();
                                }
                            });
                        } else {
                            fetchList();
                            fetchStats();
                        }
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '回复失败');
                    }
                }).catch(function(err) {
                    TDesign.MessagePlugin.error(err.response?.data?.msg || '请求失败');
                }).finally(function() { replying.value = false; });
            }

            function changeStatus(row, status) {
                axios.post('/api/admin/tickets/update-status', { id: row.id, status: status }).then(function(res) {
                    if (res.data.code === 0) {
                        TDesign.MessagePlugin.success('状态已更新');
                        fetchList();
                        fetchStats();
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '更新失败');
                    }
                });
            }

            function changePriority(row, priority) {
                axios.post('/api/admin/tickets/update-priority', { id: row.id, priority: priority }).then(function(res) {
                    if (res.data.code === 0) {
                        TDesign.MessagePlugin.success('优先级已更新');
                        fetchList();
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '更新失败');
                    }
                });
            }

            function handleDelete(row) {
                axios.post('/api/admin/tickets/delete', { id: row.id }).then(function(res) {
                    if (res.data.code === 0) {
                        TDesign.MessagePlugin.success('删除成功');
                        fetchList();
                        fetchStats();
                    } else {
                        TDesign.MessagePlugin.error(res.data.msg || '删除失败');
                    }
                });
            }

            onMounted(function() {
                fetchStats();
                fetchList();
            });

            return {
                loading, replying, tableData, stats, pagination, filters, columns,
                statusMap, categoryMap, priorityMap, statusTheme, priorityTheme,
                drawerVisible, currentTicket, replies, replyContent, chatAreaRef,
                priorityOptions, getStatusOptions, formatDate,
                fetchList, onPageChange, resetFilters, openDetail,
                sendReply, changeStatus, changePriority, handleDelete
            };
        }
    });
    app.use(TDesign);
    app.mount('#page-app');
})();
</script>
