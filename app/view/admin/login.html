use app\model\Option;

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><?= htmlspecialchars($siteName) ?> - 管理员登录</title>
    <link rel="stylesheet" href="/assets/css/tdesign.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-container { width: 400px; }
        .login-card { background: #fff; border-radius: 8px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .login-card .title { text-align: center; font-size: 24px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .login-card .subtitle { text-align: center; font-size: 14px; color: #999; margin-bottom: 32px; }
        .form-item { margin-bottom: 20px; }
        .form-item label { display: block; font-size: 14px; color: #333; margin-bottom: 8px; }
        .form-item input { width: 100%; height: 40px; border: 1px solid #dcdcdc; border-radius: 4px; padding: 0 12px; font-size: 14px; outline: none; transition: border-color 0.3s; }
        .form-item input:focus { border-color: #0052d9; }
        .login-btn { width: 100%; height: 40px; background: #0052d9; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: background 0.3s; }
        .login-btn:hover { background: #0034b5; }
        .login-btn:disabled { background: #bbd3f0; cursor: not-allowed; }
        .error-msg { color: #e34d59; font-size: 13px; margin-top: 8px; min-height: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="title"><?= htmlspecialchars($siteName) ?></div>
            <div class="subtitle">管理后台登录</div>
            <div id="login-form">
                <div class="form-item">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <div class="error-msg" id="error-msg"></div>
                <button class="login-btn" id="login-btn" onclick="handleLogin()">登录</button>
            </div>
        </div>
    </div>

<script src="/assets/js/axios.min.js"></script>
<script>
// 回车提交
document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
});
document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
});

function handleLogin() {
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value.trim();
    var errorMsg = document.getElementById('error-msg');
    var btn = document.getElementById('login-btn');

    if (!username || !password) {
        errorMsg.textContent = '请输入用户名和密码';
        return;
    }

    btn.disabled = true;
    btn.textContent = '登录中...';
    errorMsg.textContent = '';

    axios.post('/api/admin/auth/login', {
        username: username,
        password: password
    }).then(function(res) {
        if (res.data.code === 0) {
            window.location.href = '/admin/dashboard';
        } else {
            errorMsg.textContent = res.data.message || '登录失败';
            btn.disabled = false;
            btn.textContent = '登录';
        }
    }).catch(function(err) {
        errorMsg.textContent = err.response?.data?.message || '网络错误，请重试';
        btn.disabled = false;
        btn.textContent = '登录';
    });
}
</script>
</body>
</html>
